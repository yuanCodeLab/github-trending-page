nd player.","lang":"Python","langColor":"#3572A5","stars":10698,"forks":514,"today":"410 stars today","desc_zh":"一个美观、强大、自托管的 ROM 管理器和播放器。","summary_zh":"ROMM (Rom Manager) 是一个专为复古游戏爱好者设计的自托管平台，它提供了一个美观且功能强大的界面来管理和播放你的游戏 ROM 集合。用户可以轻松组织、浏览和启动各种模拟器游戏，享受便捷的复古游戏体验，同时保持对数据和隐私的完全控制。","scenarios":["拥有大量游戏 ROM，需要一个集中管理和播放的解决方案。","希望通过自托管方式，完全掌控自己的游戏库数据。","追求一个界面美观、用户体验友好的复古游戏平台。","希望方便地浏览和启动不同模拟器的游戏。"],"agent_install_prompt":"把 https://github.com/rommapp/romm 克隆到 ~/Code/romm。这个项目看起来是基于 Web 的应用，可能需要 Docker 或 Node.js 环境。请尝试查看其 `README.md` 或 `Dockerfile`，然后尝试使用 Docker Compose 启动服务。服务启动后，告诉我访问地址和端口，并确认是否能正常访问。如果需要配置数据库，请提示我。"},{"owner":"ogulcancelik","repo":"herdr","url":"https://github.com/ogulcancelik/herdr","desc":"agent multiplexer that lives in your terminal.","lang":"Rust","langColor":"#dea584","stars":12401,"forks":722,"today":"651 stars today","desc_zh":"一个驻留在您终端中的代理多路复用器。","summary_zh":"Herdr 是一个创新的终端工具，它作为一个代理多路复用器，允许用户在命令行界面中管理和交互多个 AI 代理或自动化任务。它旨在简化复杂的代理工作流，提供一个统一的接口来启动、监控和控制不同的代理进程，从而提高开发效率和终端操作的灵活性，特别适用于需要同时协调多个智能体或脚本的场景。","scenarios":["需要同时运行和管理多个 AI 代理或自动化脚本的开发者。","希望在终端中拥有一个统一界面来控制不同后台进程的用户。","寻求提高命令行工作效率，简化复杂任务协调的系统管理员。","对构建和实验多代理系统感兴趣的 AI 工程师。"],"agent_install_prompt":"把 https://github.com/ogulcancelik/herdr 克隆到 ~/Code/herdr。请查阅其 README 文件，确定其安装方式。如果它是 Go 项目，请尝试运行 `go build -o herdr .` 然后将可执行文件移动到 PATH 中。安装完成后，请运行 `herdr --version` 并把输出贴给我，以验证安装是否成功。如果需要配置，请提示我。"},{"owner":"alibaba","repo":"page-agent","url":"https://github.com/alibaba/page-agent","desc":"JavaScript in-page GUI agent. Control web interfaces with natural language.","lang":"TypeScript","langColor":"#3178c6","stars":24322,"forks":2087,"today":"805 stars today","desc_zh":"页面内 JavaScript GUI Agent。通过自然语言控制 Web 界面。","summary_zh":"page-agent 是一个创新的 JavaScript 页面内 GUI Agent，它允许用户通过自然语言指令来控制和操作 Web 界面。该项目旨在简化复杂的网页交互，提高用户体验和自动化效率，尤其适用于需要进行重复性操作或希望通过对话式界面与网页互动的使用场景。","scenarios":["希望通过自然语言自动化网页操作的开发者或测试工程师。","需要为无障碍访问或特定用户群体提供更直观 Web 交互方式的产品经理。","对构建 AI 驱动的浏览器扩展或自动化工具感兴趣的工程师。","希望探索自然语言处理与前端界面交互结合的创新应 vity)、xAI (Grok, Cursor, Copilot, VS Code, Perplexity) 等模型的系统提示词。定期更新。","summary_zh":"这个仓库收集并整理了来自 Anthropic、OpenAI、Google 和 xAI 等主流 AI 公司旗下多个大型语言模型（LLM）的系统提示词（System Prompts）。它提供了一个宝贵的资源库，揭示了这些模型在内部是如何被引导和约束的，对于研究 LLM 行为、逆向工程提示词策略以及优化自定义提示词具有重要参考价值，并且内容会定期更新。","scenarios":["研究不同 LLM 的内部工作机制和提示词工程策略。","希望了解主流 AI 模型是如何被设计和引导的。","为自己的 LLM 应用设计更有效、更鲁棒的系统提示词。","对 LLM 安全、伦理和潜在漏洞（如提示词泄露）感兴趣的研究人员。"],"agent_install_prompt":"这是一个数据仓库，主要包含文本文件。请把 https://github.com/asgeirtj/system_prompts_leaks 克隆到 ~/Code/system_prompts_leaks。克隆完成后，请列出 `~/Code/system_prompts_leaks` 目录下所有 `.md` 文件的名称，并将列表贴给我。"},{"owner":"NVIDIA","repo":"SkillSpector","url":"https://github.com/NVIDIA/SkillSpector","desc":"Security scanner for AI agent skills. Detect vulnerabilities, malicious patterns, and security risks.","lang":"Python","langColor":"#3572A5","stars":12806,"forks":1050,"today":"10,790 stars this month","desc_zh":"AI agent 技能的安全扫描器。检测漏洞、恶意模式和安全风险。","summary_zh":"SkillSpector 是 NVIDIA 开发的一款专为 AI agent 技能设计的安全扫描工具。它能够深入分析 agent 的技能代码和配置，自动识别潜在的漏洞、恶意行为模式以及其他安全风险。通过在开发早期集成安全检查，SkillSpector 帮助开发者确保 AI agent 的安全性和可靠性，有效防范各种攻击和滥用。","scenarios":["如果你正在开发 AI agent 技能，并希望在部署前进行全面的安全审计。","如果你担心 AI agent 技能中可能存在的漏洞或恶意代码。","如果你需要一个自动化工具来检测和缓解 AI agent 的安全风险。","如果你希望提高 AI agent 的可靠性和抵御潜在攻击的能力。"],"agent_install_prompt":"请将 https://github.com/NVIDIA/SkillSpector 克隆到 ~/Code/SkillSpector。请查看 README 文件，确定其主要语言和安装方式。如果这是一个 Python 项目，请运行 `pip install -r requirements.txt` 安装依赖。安装完成后，请尝试运行其提供的任何示例扫描命令，例如 `python skillspector.py scan --skill-path ./path/to/your/skill`，并将扫描结果贴给我。"},{"owner":"kunchenguid","repo":"no-mistakes","url":"https://github.com/kunchenguid/no-mistakes","desc":"git push no-mistakes","lang":"Go","langColor":"#00ADD8","stars":5853,"forks":513,"today":"4,599 stars this month","desc_zh":"git push no-mistakes。","summary_zh":"`no-mistakes` 是一个 Git 钩子（Git Hook）或辅助工具，旨在帮助开发者在执行 `git push` 操作时避免常见的错误或不规范行为。通过在推送前进行代码风格检查、测试运行或自定义验证，它能有效防止不符合团队规范或存在潜在问题的代码被推送到远程仓库，从而提高代码质量和团队协作效率。","scenarios":["希望在 `git push` 前自动执行代码质量检查或测试。","需要强制团队成员遵循特定的 Git 提交规范或代码风格。","希望减少因提交错误代码而导致的回滚或修复工作。","对自定义 Git 工作流和自动化感兴趣的开发者。"],"agent_install_prompt":"把 https://github.com/kunchenguid/no-mistakes 克隆到 ~/Code/no-mistakes。进入 `~/Code/no-mistakes` 目录。`no-mistakes` 看起来是一个 Git pre-push 钩子。请查看 `README.md` 文件，通常会有一个命令来将其复制或链接到 `.git/hooks/pre-push`。请找到这个命令并执行它。执行完成后，请尝试在一个测试仓库中进行一次 `git push` 操作，并告诉我 `no-mistakes` 是否被触发以及其输出。"},{"owner":"usestrix","repo":"strix","url":"https://github.com/usestrix/strix","desc":"Open-source AI penetration testing tool to find and fix your app’s vulnerabilities.","lang":"Python","langColor":"#3572A5","stars":40271,"forks":4228,"today":"14,196 stars this month","desc_zh":"开源的 AI 渗透测试工具，用于发现和修复应用程序的漏洞。","summary_zh":"Strix 是一款利用 AI 技术的开源渗透测试工具，旨在自动化地识别并帮助修复应用程序中的安全漏洞。它通过智能分析代码和运行时行为，提供比传统扫描工具更深入的洞察，从而提升应用的安全防护能力。","scenarios":["开发者在 CI/CD 流程中集成自动化安全测试。","安全工程师需要一款智能工具来辅助发现应用漏洞。","初创公司或个人开发者希望以低成本提升应用安全性。","对 AI 驱动的渗透测试技术感兴趣，希望学习和实践。"],"agent_install_prompt":"请把 https://github.com/usestrix/strix 克隆到 ~/Code/strix。根据其描述，这可能是一个 Python 或 Go 项目。请查看 README 文件，找到安装说明，然后执行安装命令。安装完成后，尝试运行一个简单的扫描命令（如果 README 中有示例），并把输出贴给我。如果需要配置 API key，请提示我。"},{"owner":"ogulcancelik","repo":"herdr","url":"https://github.com/ogulcancelik/herdr","desc":"agent multiplexer that lives in your terminal.","lang":"Rust","langColor":"#dea584","stars":15305,"forks":1020,"today":"9,902 stars this month","desc_zh":"一个驻留在您终端中的代理多路复用器。","summary_zh":"Herdr 是一个创新的终端工具，它作为一个代理多路复用器，允许用户在命令行界面中管理和交互多个 AI 代理或自动化任务。它旨在简化复杂的代理工作流，提供一个统一的接口来启动、监控和控制不同的代理进程，从而提高开发效率和终端操作的灵活性，特别适用于需要同时协调多个智能体或脚本的场景。","scenarios":["需要同时运行和管理多个 AI 代理或自动化脚本的开发者。","希望在终端中拥有一个统一界面来控制不同后台进程的用户。","寻求提高命令行工作效率，简化复杂任务协调的系统管理员。","对构建和实验多代理系统感兴趣的 AI 工程师。"],"agent_install_prompt":"把 https://github.com/ogulcancelik/herdr 克隆到 ~/Code/herdr。请查阅其 README 文件，确定其安装方式。如果它是 Go 项目，请尝试运行 `go build -o herdr .` 然后将可执行文件移动到 PATH 中。安装完成后，请运行 `herdr --version` 并把输出贴给我，以验证安装是否成功。如果需要配置，请提示我。"},{"owner":"iptv-org","repo":"iptv","url":"https://github.com/iptv-org <script>
(function () {
  var STORAGE_KEY = 'gh-trending-prefs-v2';
  var FETCHED_AT = '2026-07-11T07:21:51+00:00';

  var sinceEl = document.getElementById('since');
  var langEl = document.getElementById('lang');
  var searchEl = document.getElementById('search');
  var listEl = document.getElementById('list');
  var metaEl = document.getElementById('meta');

  // Read every <script type="application/json" id="trending-data-*"> block.
  // Returns map keyed by the suffix after "trending-data-".
  function readAllDatasets() {
    var map = {};
    var nodes = document.querySelectorAll('script[type="application/json"][id^="trending-data-"]');
    for (var i = 0; i < nodes.length; i++) {
      var id = nodes[i].id.slice('trending-data-'.length);
      try {
        var d = JSON.parse(nodes[i].textContent || '{}');
        map[id] = d || { repos: [] };
      } catch (e) {
        map[id] = { repos: [] };
      }
    }
    return map;
  }

  var DATASETS = readAllDatasets();

  // Compute Period dropdown order:
  //   daily snapshots, sorted by date DESC (most recent first → 今日, 昨日, 前天, ...)
  //   then weekly, monthly, yearly (whichever exist)
  function buildPeriodOptions() {
    var keys = Object.keys(DATASETS);
    var dailyKeys = keys.filter(function (k) { return /^daily-\d{4}-\d{2}-\d{2}$/.test(k); }).sort().reverse();
    var FIXED = ['weekly', 'monthly', 'yearly'];
    var fixedKeys = FIXED.filter(function (k) { return DATASETS[k]; });

    var ordered = dailyKeys.concat(fixedKeys);
    if (!ordered.length) return;

    var labels = {};
    dailyKeys.forEach(function (k, i) {
      if (i === 0) labels[k] = '今日';
      else if (i === 1) labels[k] = '昨日';
      else if (i === 2) labels[k] = '前天';
      else labels[k] = i + ' 天前';
    });
    labels.weekly = '本周';
    labels.monthly = '本月';
    labels.yearly = '本年';

    sinceEl.innerHTML = ordered.map(function (k) {
      return '<option value="' + escapeHTML(k) + '">' + escapeHTML(labels[k] || k) + '</option>';
    }).join('');
  }

  var LANG_COLORS = {
    'TypeScript':'#3178c6','JavaScript':'#f1e05a','Python':'#3572A5','Go':'#00ADD8',
    'Rust':'#dea584','Java':'#b07219','C++':'#f34b7d','C':'#555555','C#':'#178600',
    'Swift':'#F05138','Kotlin':'#A97BFF','Ruby':'#701516','PHP':'#4F5D95',
    'Shell':'#89e051','HTML':'#e34c26','CSS':'#663399','Vue':'#41b883',
    'Scala':'#c22d40','Dart':'#00B4AB','Elixir':'#6e4a7e','Haskell':'#5e5086',
    'Lua':'#000080','Perl':'#0298c3','R':'#198CE7','Solidity':'#AA6746',
    'Jupyter Notebook':'#DA5B0B','MDX':'#fcb32c','Zig':'#ec915c','Nim':'#37775b',
    'Clojure':'#db5855','Erlang':'#B83998','OCaml':'#3be133','Fortran':'#4d41b1',
    'Julia':'#a270ba','Objective-C':'#438eff','Astro':'#ff5a03','Svelte':'#ff3e00',
    'Batchfile':'#C1F12E'
  };

  function escapeHTML(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
      return ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' })[c];
    });
  }

  function fmtNum(n) {
    if (n >= 1000) return (n / 1000).toFixed(n >= 10000 ? 0 : 1).replace(/\.0$/, '') + 'k';
    return String(n);
  }

  function getRepos() {
    var since = sinceEl.value;
    var ds = DATASETS[since] || { repos: [] };
    return ds.repos || [];
  }

  function rebuildLanguageOptions() {
    var langs = {};
    Object.keys(DATASETS).forEach(function (k) {
      (DATASETS[k].repos || []).forEach(function (r) { if (r.lang) langs[r.lang] = true; });
    });
    var sorted = Object.keys(langs).sort(function (a, b) { return a.localeCompare(b); });
    var prev = langEl.value;
    langEl.innerHTML = '<option value="">All languages</option>' + sorted.map(function (l) {
      return '<option value="' + escapeHTML(l) + '">' + escapeHTML(l) + '</option>';
    }).join('');
    if (sorted.indexOf(prev) !== -1) langEl.value = prev;
  }

  function applyFilters(repos) {
    var lang = langEl.value;
    var q = (searchEl.value || '').trim().toLowerCase();
    return repos.filter(function (r) {
      if (lang && r.lang !== lang) return false;
      if (q) {
        var hay = (r.owner + '/' + r.repo + ' ' + (r.desc || '') + ' ' + (r.desc_zh || '')).toLowerCase();
        if (hay.indexOf(q) === -1) return false;
      }
      return true;
    });
  }

  function hasAIData(r) {
    return !!(r.summary_zh || (Array.isArray(r.scenarios) && r.scenarios.length) || r.agent_install_prompt);
  }

  function renderAIPanel(r, panelId) {
    var parts = ['<div class="ai-panel" id="', panelId, '" hidden>'];
    if (r.summary_zh) {
      parts.push('<section>');
      parts.push('<h3>AI 总结</h3>');
      parts.push('<p class="summary-text">', escapeHTML(r.summary_zh), '</p>');
      parts.push('</section>');
    }
    if (Array.isArray(r.scenarios) && r.scenarios.length) {
      parts.push('<section>');
      parts.push('<h3>适用场景</h3>');
      parts.push('<ul class="scenarios">');
      for (var j = 0; j < r.scenarios.length; j++) {
        parts.push('<li>', escapeHTML(r.scenarios[j]), '</li>');
      }
      parts.push('</ul>');
      parts.push('</section>');
    }
    if (r.agent_install_prompt) {
      parts.push('<section>');
      parts.push('<h3>AI Agent 安装提示词</h3>');
      parts.push('<div class="prompt-box">');
      parts.push('<pre class="prompt">', escapeHTML(r.agent_install_prompt), '</pre>');
      parts.push('<button class="copy-btn" type="button">复制</button>');
      parts.push('</div>');
      parts.push('</section>');
    }
    parts.push('</div>');
    return parts.join('');
  }

  function render() {
    var repos = applyFilters(getRepos());
    if (!repos.length) {
      listEl.innerHTML = '<div class="empty">No matching repos.</div>';
      return;
    }
    var rows = repos.map(function (r, i) {
      var color = r.langColor || (r.lang && LANG_COLORS[r.lang]) || '#8b949e';
      var showAI = hasAIData(r);
      var panelId = 'ai-panel-' + i;
      var parts = [
        '<div class="repo">',
          '<div class="row1">',
            '<div class="rank">', String(i + 1).padStart(2, '0'), '</div>',
            '<div class="name">',
              '<a href="', escapeHTML(r.url), '" target="_blank" rel="noopener noreferrer">',
                '<span class="owner">', escapeHTML(r.owner), ' / </span>',
                escapeHTML(r.repo),
              '</a>',
            '</div>',
          '</div>',
          (r.desc_zh || r.desc) ? '<p class="desc">' + escapeHTML(r.desc_zh || r.desc) + '</p>' : '',
          '<div class="stats">',
            r.lang ? '<span class="lang"><span class="dot" style="background:' + escapeHTML(color) + '"></span>' + escapeHTML(r.lang) + '</span>' : '',
            '<span title="Total stars">★ ' + fmtNum(r.stars || 0) + '</span>',
            r.forks ? '<span title="Forks">⑂ ' + fmtNum(r.forks) + '</span>' : '',
            r.today ? '<span class="today">▲ ' + escapeHTML(r.today) + '</span>' : '',
          '</div>',
      ];
      if (showAI) {
        parts.push(
          '<button class="ai-toggle" type="button" aria-expanded="false" aria-controls="', panelId, '">',
            '<span class="badge">AI</span>',
            '<span class="toggle-text">详情</span>',
            '<span class="chev">▾</span>',
          '</button>'
        );
        parts.push(renderAIPanel(r, panelId));
      }
      parts.push('</div>');
      return parts.join('');
    });
    listEl.innerHTML = rows.join('');
  }

  // Expand/collapse AI panel + copy install prompt to clipboard
  listEl.addEventListener('click', function (e) {
    var toggle = e.target.closest('.ai-toggle');
    if (toggle) {
      var panelId = toggle.getAttribute('aria-controls');
      var panel = document.getElementById(panelId);
      if (panel) {
        var open = panel.hasAttribute('hidden') ? false : true;
        if (open) {
          panel.setAttribute('hidden', '');
          toggle.setAttribute('aria-expanded', 'false');
          toggle.querySelector('.toggle-text').textContent = '详情';
        } else {
          panel.removeAttribute('hidden');
          toggle.setAttribute('aria-expanded', 'true');
          toggle.querySelector('.toggle-text').textContent = '收起';
        }
      }
      return;
    }
    var copyBtn = e.target.closest('.copy-btn');
    if (copyBtn) {
      var pre = copyBtn.parentElement.querySelector('pre.prompt');
      var text = pre ? pre.textContent : '';
      var done = function () {
        copyBtn.textContent = '已复制 ✓';
        copyBtn.classList.add('copied');
        setTimeout(function () {
          copyBtn.textContent = '复制';
          copyBtn.classList.remove('copied');
        }, 1800);
      };
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(done).catch(function () {
          // fallback
          var ta = document.createElement('textarea');
          ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
          document.body.appendChild(ta); ta.select();
          try { document.execCommand('copy'); } catch(_) {}
          document.body.removeChild(ta); done();
        });
      } else {
        var ta = document.createElement('textarea');
        ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
        document.body.appendChild(ta); ta.select();
        try { document.execCommand('copy'); } catch(_) {}
        document.body.removeChild(ta); done();
      }
    }
  });

  function updateMeta() {
    var since = sinceEl.value;
    var ds = DATASETS[since] || { repos: [] };
    var stamp = '';
    try {
      var d = new Date(FETCHED_AT);
      if (!isNaN(d.getTime())) {
        stamp = d.toLocaleString([], { dateStyle: 'medium', timeStyle: 'short' });
      } else {
        stamp = FETCHED_AT;
      }
    } catch (_) { stamp = FETCHED_AT; }
    metaEl.textContent = 'Updated ' + stamp + ' · ' + (ds.repos || []).length + ' repos';
  }

  function savePrefs() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        since: sinceEl.value, lang: langEl.value, search: searchEl.value
      }));
    } catch (_) {}
  }

  function restorePrefs() {
    try {
      var p = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      if (p.since && DATASETS[p.since]) sinceEl.value = p.since;
      if (typeof p.search === 'string') searchEl.value = p.search;
      // p.lang is restored in rebuildLanguageOptions (after options exist)
      if (typeof p.lang === 'string') langEl.value = p.lang;
    } catch (_) {}
  }

  buildPeriodOptions();
  rebuildLanguageOptions();
  restorePrefs();
  // If restored `since` no longer exists in the new dropdown (e.g. yesterday's
  // daily was rolled out), fall back to the first available option.
  if (!sinceEl.value || !DATASETS[sinceEl.value]) {
    var first = sinceEl.options[0];
    if (first) sinceEl.value = first.value;
  }
  updateMeta();
  render();

  sinceEl.addEventListener('change', function () { savePrefs(); updateMeta(); render(); });
  langEl.addEventListener('change', function () { savePrefs(); render(); });
  searchEl.addEventListener('input', function () { savePrefs(); render(); });
})();
</script>
</body>
</html>
