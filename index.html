g boring, generic slop","lang":"Shell","langColor":"#89e051","stars":37823,"forks":2699,"today":"1,103 stars today","desc_zh":"Taste-Skill - 让你的 AI 拥有好品味。阻止 AI 生成无聊、平庸的内容。","summary_zh":"Taste-Skill 是一个旨在提升 AI 生成内容质量的工具或框架，它通过引入一套“品味”机制，帮助 AI 避免产生重复、缺乏新意或质量低下的输出。其核心目标是让 AI 的创作更具独创性和吸引力，从而摆脱传统 AI 常见的“平庸”问题，适用于追求高质量内容生成的场景。","scenarios":["如果你发现你的 AI 模型经常生成无聊、重复或缺乏创意的文本。","如果你希望提升 AI 在写作、内容创作或对话中的“品味”和独特性。","如果你正在寻找一种方法来过滤或修正 AI 生成的“平庸”内容。"],"agent_install_prompt":"请将 https://github.com/Leonxlnx/taste-skill 克隆到 ~/Code/taste-skill。这是一个 Python 项目，请在项目根目录下运行 pip install -e . 安装依赖。如果它需要访问某个 LLM 的 API key (例如 OPENAI_API_KEY 或 ANTHROPIC_API_KEY)，请提示我稍后提供。安装完成后，请查看 README.md 或 examples/ 目录，寻找一个简单的使用示例或测试脚本。运行该示例，并将输出结果（包括任何文本生成或评估结果）贴给我。"},{"owner":"NousResearch","repo":"hermes-agent","url":"https://github.com/NousResearch/hermes-agent","desc":"The agent that grows with you","lang":"Python","langColor":"#3572A5","stars":186678,"forks":32115,"today":"1,112 stars today","desc_zh":"随你一同成长的智能代理。","summary_zh":"Hermes Agent 是 NousResearch 开发的一个智能代理项目，旨在提供一个能够通过学习和交互不断提升能力的 AI 助手。它强调代理的适应性和成长性，使其能够更好地理解用户需求并提供个性化的解决方案，适用于需要长期协作和进化的AI应用场景。","scenarios":["希望构建一个能够随着时间推移，通过与用户交互而不断学习和改进的个性化 AI 助手。","正在开发需要长期记忆、自我修正和适应新环境能力的智能代理系统。","对探索和实现更高级的 AI 代理行为和认知架构感兴趣的研究者或开发者。"],"agent_install_prompt":"把 https://github.com/NousResearch/hermes-agent 克隆到 ~/Code/hermes-agent。这个项目看起来是 Python 项目，请运行 `pip install -e .` 安装依赖。安装完成后，查看 README 文件，找到一个简单的启动或测试命令，运行它并把输出贴给我。如果需要配置 API key，请提示我，我稍后会提供。"},{"owner":"lfnovo","repo":"open-notebook","url":"https://github.com/lfnovo/open-notebook","desc":"An Open Source implementation of Notebook LM with more flexibility and features","lang":"TypeScript","langColor":"#3178c6","stars":27691,"forks":3133,"today":"554 stars today","desc_zh":"一个开源实现，比 Notebook LM 拥有更高的灵活性和更多功能。","summary_zh":"Open-Notebook 是对 Google NotebookLM 的一个开源复刻和增强版本，旨在提供一个更具灵活性和功能丰富的 AI 辅助笔记和知识管理平台。它允许用户导入文档、进行智能问答、生成摘要和组织信息，同时提供更多自定义选项和扩展能力，以满足不同用户的个性化需求。","scenarios":["希望使用 AI 工具来辅助学习、研究或内容 g":"Python","langColor":"#3572A5","stars":30475,"forks":0,"today":"","desc_zh":"专为 Claude Code 设计的学术研究技能：研究 → 撰写 → 审阅 → 修改 → 定稿。","summary_zh":"该项目为 Claude Code 提供了增强的学术研究工作流，涵盖了从初步研究、论文撰写、同行审阅、内容修改到最终定稿的全过程。它旨在通过自动化和辅助工具，帮助研究人员利用 AI 提升学术产出的效率和质量，简化复杂的科研写作流程。","scenarios":["您是学术研究人员，希望利用 AI 辅助完成论文撰写、审阅和修改等任务。","您正在使用 Claude Code 作为 AI 助手，并希望为其集成更专业的学术研究工作流。","您希望提高学术写作的效率和质量，减少人工审阅和修改的时间。","您需要一个结构化的 AI 辅助流程来管理您的学术研究项目，从构思到发表。"],"agent_install_prompt":"把 https://github.com/Imbad0202/academic-research-skills 克隆到 ~/Code/academic-research-skills。这是一个 Python 项目。请运行 `pip install -e .` 安装依赖。如果需要配置 API key，请检查项目根目录或 `config` 文件夹中是否有配置文件模板，并提示我如何设置 Claude API key (我等下粘 key)。安装完成后，请尝试运行一个简单的研究流程示例，把输出贴给我。"}],"count":30}</script>

<script>
(function () {
  var STORAGE_KEY = 'gh-trending-prefs-v2';
  var FETCHED_AT = '2026-06-12T09:40:10+00:00';

  var sinceEl = document.getElementById('since');
  var langEl = document.getElementById('lang');
  var searchEl = document.getElementById('search');
  var listEl = document.getElementById('list');
  var metaEl = document.getElementById('meta');

  // Read every <script type="application/json" id="trending-data-*"> block.
  // Returns map keyed by the suffix after "trending-data-".
  function readAllDatasets() {
    var map = {};
    var nodes = document.querySelectorAll('script[type="application/json"][id^="trending-data-"]');
    for (var i = 0; i < nodes.length; i++) {
      var id = nodes[i].id.slice('trending-data-'.length);
      try {
        var d = JSON.parse(nodes[i].textContent || '{}');
        map[id] = d || { repos: [] };
      } catch (e) {
        map[id] = { repos: [] };
      }
    }
    return map;
  }

  var DATASETS = readAllDatasets();

  // Compute Period dropdown order:
  //   daily snapshots, sorted by date DESC (most recent first → 今日, 昨日, 前天, ...)
  //   then weekly, monthly, yearly (whichever exist)
  function buildPeriodOptions() {
    var keys = Object.keys(DATASETS);
    var dailyKeys = keys.filter(function (k) { return /^daily-\d{4}-\d{2}-\d{2}$/.test(k); }).sort().reverse();
    var FIXED = ['weekly', 'monthly', 'yearly'];
    var fixedKeys = FIXED.filter(function (k) { return DATASETS[k]; });

    var ordered = dailyKeys.concat(fixedKeys);
    if (!ordered.length) return;

    var labels = {};
    dailyKeys.forEach(function (k, i) {
      if (i === 0) labels[k] = '今日';
      else if (i === 1) labels[k] = '昨日';
      else if (i === 2) labels[k] = '前天';
      else labels[k] = i + ' 天前';
    });
    labels.weekly = '本周';
    labels.monthly = '本月';
    labels.yearly = '本年';

    sinceEl.innerHTML = ordered.map(function (k) {
      return '<option value="' + escapeHTML(k) + '">' + escapeHTML(labels[k] || k) + '</option>';
    }).join('');
  }

  var LANG_COLORS = {
    'TypeScript':'#3178c6','JavaScript':'#f1e05a','Python':'#3572A5','Go':'#00ADD8',
    'Rust':'#dea584','Java':'#b07219','C++':'#f34b7d','C':'#555555','C#':'#178600',
    'Swift':'#F05138','Kotlin':'#A97BFF','Ruby':'#701516','PHP':'#4F5D95',
    'Shell':'#89e051','HTML':'#e34c26','CSS':'#663399','Vue':'#41b883',
    'Scala':'#c22d40','Dart':'#00B4AB','Elixir':'#6e4a7e','Haskell':'#5e5086',
    'Lua':'#000080','Perl':'#0298c3','R':'#198CE7','Solidity':'#AA6746',
    'Jupyter Notebook':'#DA5B0B','MDX':'#fcb32c','Zig':'#ec915c','Nim':'#37775b',
    'Clojure':'#db5855','Erlang':'#B83998','OCaml':'#3be133','Fortran':'#4d41b1',
    'Julia':'#a270ba','Objective-C':'#438eff','Astro':'#ff5a03','Svelte':'#ff3e00',
    'Batchfile':'#C1F12E'
  };

  function escapeHTML(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
      return ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' })[c];
    });
  }

  function fmtNum(n) {
    if (n >= 1000) return (n / 1000).toFixed(n >= 10000 ? 0 : 1).replace(/\.0$/, '') + 'k';
    return String(n);
  }

  function getRepos() {
    var since = sinceEl.value;
    var ds = DATASETS[since] || { repos: [] };
    return ds.repos || [];
  }

  function rebuildLanguageOptions() {
    var langs = {};
    Object.keys(DATASETS).forEach(function (k) {
      (DATASETS[k].repos || []).forEach(function (r) { if (r.lang) langs[r.lang] = true; });
    });
    var sorted = Object.keys(langs).sort(function (a, b) { return a.localeCompare(b); });
    var prev = langEl.value;
    langEl.innerHTML = '<option value="">All languages</option>' + sorted.map(function (l) {
      return '<option value="' + escapeHTML(l) + '">' + escapeHTML(l) + '</option>';
    }).join('');
    if (sorted.indexOf(prev) !== -1) langEl.value = prev;
  }

  function applyFilters(repos) {
    var lang = langEl.value;
    var q = (searchEl.value || '').trim().toLowerCase();
    return repos.filter(function (r) {
      if (lang && r.lang !== lang) return false;
      if (q) {
        var hay = (r.owner + '/' + r.repo + ' ' + (r.desc || '') + ' ' + (r.desc_zh || '')).toLowerCase();
        if (hay.indexOf(q) === -1) return false;
      }
      return true;
    });
  }

  function hasAIData(r) {
    return !!(r.summary_zh || (Array.isArray(r.scenarios) && r.scenarios.length) || r.agent_install_prompt);
  }

  function renderAIPanel(r, panelId) {
    var parts = ['<div class="ai-panel" id="', panelId, '" hidden>'];
    if (r.summary_zh) {
      parts.push('<section>');
      parts.push('<h3>AI 总结</h3>');
      parts.push('<p class="summary-text">', escapeHTML(r.summary_zh), '</p>');
      parts.push('</section>');
    }
    if (Array.isArray(r.scenarios) && r.scenarios.length) {
      parts.push('<section>');
      parts.push('<h3>适用场景</h3>');
      parts.push('<ul class="scenarios">');
      for (var j = 0; j < r.scenarios.length; j++) {
        parts.push('<li>', escapeHTML(r.scenarios[j]), '</li>');
      }
      parts.push('</ul>');
      parts.push('</section>');
    }
    if (r.agent_install_prompt) {
      parts.push('<section>');
      parts.push('<h3>AI Agent 安装提示词</h3>');
      parts.push('<div class="prompt-box">');
      parts.push('<pre class="prompt">', escapeHTML(r.agent_install_prompt), '</pre>');
      parts.push('<button class="copy-btn" type="button">复制</button>');
      parts.push('</div>');
      parts.push('</section>');
    }
    parts.push('</div>');
    return parts.join('');
  }

  function render() {
    var repos = applyFilters(getRepos());
    if (!repos.length) {
      listEl.innerHTML = '<div class="empty">No matching repos.</div>';
      return;
    }
    var rows = repos.map(function (r, i) {
      var color = r.langColor || (r.lang && LANG_COLORS[r.lang]) || '#8b949e';
      var showAI = hasAIData(r);
      var panelId = 'ai-panel-' + i;
      var parts = [
        '<div class="repo">',
          '<div class="row1">',
            '<div class="rank">', String(i + 1).padStart(2, '0'), '</div>',
            '<div class="name">',
              '<a href="', escapeHTML(r.url), '" target="_blank" rel="noopener noreferrer">',
                '<span class="owner">', escapeHTML(r.owner), ' / </span>',
                escapeHTML(r.repo),
              '</a>',
            '</div>',
          '</div>',
          (r.desc_zh || r.desc) ? '<p class="desc">' + escapeHTML(r.desc_zh || r.desc) + '</p>' : '',
          '<div class="stats">',
            r.lang ? '<span class="lang"><span class="dot" style="background:' + escapeHTML(color) + '"></span>' + escapeHTML(r.lang) + '</span>' : '',
            '<span title="Total stars">★ ' + fmtNum(r.stars || 0) + '</span>',
            r.forks ? '<span title="Forks">⑂ ' + fmtNum(r.forks) + '</span>' : '',
            r.today ? '<span class="today">▲ ' + escapeHTML(r.today) + '</span>' : '',
          '</div>',
      ];
      if (showAI) {
        parts.push(
          '<button class="ai-toggle" type="button" aria-expanded="false" aria-controls="', panelId, '">',
            '<span class="badge">AI</span>',
            '<span class="toggle-text">详情</span>',
            '<span class="chev">▾</span>',
          '</button>'
        );
        parts.push(renderAIPanel(r, panelId));
      }
      parts.push('</div>');
      return parts.join('');
    });
    listEl.innerHTML = rows.join('');
  }

  // Expand/collapse AI panel + copy install prompt to clipboard
  listEl.addEventListener('click', function (e) {
    var toggle = e.target.closest('.ai-toggle');
    if (toggle) {
      var panelId = toggle.getAttribute('aria-controls');
      var panel = document.getElementById(panelId);
      if (panel) {
        var open = panel.hasAttribute('hidden') ? false : true;
        if (open) {
          panel.setAttribute('hidden', '');
          toggle.setAttribute('aria-expanded', 'false');
          toggle.querySelector('.toggle-text').textContent = '详情';
        } else {
          panel.removeAttribute('hidden');
          toggle.setAttribute('aria-expanded', 'true');
          toggle.querySelector('.toggle-text').textContent = '收起';
        }
      }
      return;
    }
    var copyBtn = e.target.closest('.copy-btn');
    if (copyBtn) {
      var pre = copyBtn.parentElement.querySelector('pre.prompt');
      var text = pre ? pre.textContent : '';
      var done = function () {
        copyBtn.textContent = '已复制 ✓';
        copyBtn.classList.add('copied');
        setTimeout(function () {
          copyBtn.textContent = '复制';
          copyBtn.classList.remove('copied');
        }, 1800);
      };
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(done).catch(function () {
          // fallback
          var ta = document.createElement('textarea');
          ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
          document.body.appendChild(ta); ta.select();
          try { document.execCommand('copy'); } catch(_) {}
          document.body.removeChild(ta); done();
        });
      } else {
        var ta = document.createElement('textarea');
        ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
        document.body.appendChild(ta); ta.select();
        try { document.execCommand('copy'); } catch(_) {}
        document.body.removeChild(ta); done();
      }
    }
  });

  function updateMeta() {
    var since = sinceEl.value;
    var ds = DATASETS[since] || { repos: [] };
    var stamp = '';
    try {
      var d = new Date(FETCHED_AT);
      if (!isNaN(d.getTime())) {
        stamp = d.toLocaleString([], { dateStyle: 'medium', timeStyle: 'short' });
      } else {
        stamp = FETCHED_AT;
      }
    } catch (_) { stamp = FETCHED_AT; }
    metaEl.textContent = 'Updated ' + stamp + ' · ' + (ds.repos || []).length + ' repos';
  }

  function savePrefs() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        since: sinceEl.value, lang: langEl.value, search: searchEl.value
      }));
    } catch (_) {}
  }

  function restorePrefs() {
    try {
      var p = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      if (p.since && DATASETS[p.since]) sinceEl.value = p.since;
      if (typeof p.search === 'string') searchEl.value = p.search;
      // p.lang is restored in rebuildLanguageOptions (after options exist)
      if (typeof p.lang === 'string') langEl.value = p.lang;
    } catch (_) {}
  }

  buildPeriodOptions();
  rebuildLanguageOptions();
  restorePrefs();
  // If restored `since` no longer exists in the new dropdown (e.g. yesterday's
  // daily was rolled out), fall back to the first available option.
  if (!sinceEl.value || !DATASETS[sinceEl.value]) {
    var first = sinceEl.options[0];
    if (first) sinceEl.value = first.value;
  }
  updateMeta();
  render();

  sinceEl.addEventListener('change', function () { savePrefs(); updateMeta(); render(); });
  langEl.addEventListener('change', function () { savePrefs(); render(); });
  searchEl.addEventListener('input', function () { savePrefs(); render(); });
})();
</script>
