name: Daily refresh

# 北京时间中午 12 点 = UTC 04:00。GitHub Actions 的 cron 用 UTC。
# 注意:GitHub 的 cron 调度有时会延迟 5-15 分钟,这是平台特性,不要紧。
on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch: {}  # 允许从 Actions 页面手动触发

permissions:
  contents: write  # 允许 commit 回 main

concurrency:
  group: daily-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Build index.html
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # 默认走官方 https://generativelanguage.googleapis.com/v1beta
          # 切到自建/第三方代理:在 repo Settings → Variables 里设
          #   GEMINI_BASE_URL=http://170.106.186.58
          #   GEMINI_API_VERSION=v1beta
          # 同时把 GEMINI_API_KEY secret 改成代理的 key (sk-...)
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          GEMINI_BASE_URL: ${{ vars.GEMINI_BASE_URL }}
          GEMINI_API_VERSION: ${{ vars.GEMINI_API_VERSION }}
        run: node scripts/build.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --staged --quiet; then
            echo "no changes — skipping commit"
          else
            DATE=$(date -u +%Y-%m-%d)
            git commit -m "refresh: ${DATE} trending data"
            git push
          fi
