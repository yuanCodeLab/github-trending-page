name: Daily refresh

# 北京时间中午 12 点 = UTC 04:00。GitHub Actions 的 cron 用 UTC。
# 注意:GitHub 的 cron 调度有时会延迟 5-15 分钟,这是平台特性,不要紧。
on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch: {}  # 允许从 Actions 页面手动触发

permissions:
  contents: write  # 允许 commit 回 main

concurrency:
  group: daily-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Build index.html
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # GEMINI_MODEL: gemini-2.0-flash    # 取消注释可换模型
        run: node scripts/build.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --staged --quiet; then
            echo "no changes — skipping commit"
          else
            DATE=$(date -u +%Y-%m-%d)
            git commit -m "refresh: ${DATE} trending data"
            git push
          fi
